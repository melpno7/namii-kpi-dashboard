<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Na-Mii · KPI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #fafaf7;
    --paper: #ffffff;
    --surface: #f5f5f1;
    --ink: #0a0a0a;
    --ink-2: #2a2a2a;
    --muted: #6b6b66;
    --line: #e8e8e2;
    --accent: #1d3557;
    --accent-soft: #e5edf5;
    --green: #15803d;
    --green-soft: #dcfce7;
    --amber: #b45309;
    --amber-soft: #fef3c7;
    --red: #b91c1c;
    --red-soft: #fee2e2;
    --gray: #64748b;
    --gray-soft: #f1f5f9;
    --serif: ui-serif, "Charter", "Iowan Old Style", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 28px 32px 64px; }

  /* SYNC BANNER */
  .sync-banner { display: flex; justify-content: space-between; align-items: center; gap: 16px; background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 10px 18px; margin-bottom: 14px; font-size: 12.5px; font-family: var(--mono); color: var(--ink-2); flex-wrap: wrap; }
  .sync-banner b { color: var(--ink); font-weight: 700; }
  .sync-left { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
  .sync-pulse { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; vertical-align: middle; animation: pulse 2s ease-in-out infinite; }
  .sync-pulse.loading { background: var(--amber); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .sync-cta { color: var(--accent); font-weight: 600; }

  /* HERO */
  .hero { background: var(--paper); border: 1px solid var(--line); border-radius: 16px; padding: 30px 36px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr auto; gap: 36px; align-items: center; }
  @media (max-width: 720px) { .hero { grid-template-columns: 1fr; padding: 24px; } }
  .hero-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .hero-title { font-family: var(--serif); font-size: 44px; font-weight: 600; line-height: 1.05; letter-spacing: -0.02em; margin: 0 0 8px; }
  @media (max-width: 720px) { .hero-title { font-size: 34px; } }
  .hero-focus { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--ink-2); margin-bottom: 16px; }
  .hero-anchor { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--accent-soft); color: var(--accent); border-radius: 99px; font-size: 12px; font-weight: 600; }
  .hero-timeline { margin-top: 20px; }
  .hero-timeline-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; font-family: var(--mono); }
  .hero-timeline-bar { position: relative; height: 6px; background: var(--surface); border-radius: 99px; }
  .hero-timeline-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #2563eb); border-radius: 99px; }
  .hero-timeline-marker { position: absolute; top: -4px; width: 14px; height: 14px; background: var(--paper); border: 3px solid var(--accent); border-radius: 50%; transform: translateX(-50%); }
  .hero-right { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 200px; }
  .donut-wrap { position: relative; width: 170px; height: 170px; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .donut-pct { font-family: var(--serif); font-size: 44px; font-weight: 600; line-height: 1; }
  .donut-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .donut-meta { font-size: 13px; color: var(--ink-2); text-align: center; }
  .donut-meta b { color: var(--ink); }

  /* SECTIONS */
  .section { margin-bottom: 32px; }
  .section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; gap: 16px; }
  .section-title { font-family: var(--serif); font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
  .section-sub { font-size: 12.5px; color: var(--muted); }
  .section-sub b { color: var(--ink-2); }

  /* INSIGHTS */
  .insights-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 900px) { .insights-grid { grid-template-columns: 1fr; } }
  .insight { background: var(--paper); border: 1px solid var(--line); border-left: 4px solid var(--gray); border-radius: 12px; padding: 18px 22px; }
  .insight.up { border-left-color: var(--green); }
  .insight.down { border-left-color: var(--red); }
  .insight.alert { border-left-color: var(--amber); }
  .insight.flat { border-left-color: var(--accent); }
  .insight-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .insight-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .insight.up .insight-tag { background: var(--green-soft); color: var(--green); }
  .insight.down .insight-tag { background: var(--red-soft); color: var(--red); }
  .insight.alert .insight-tag { background: var(--amber-soft); color: var(--amber); }
  .insight.flat .insight-tag { background: var(--accent-soft); color: var(--accent); }
  .insight-title { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--ink); margin: 0; line-height: 1.25; }
  .insight-body { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin: 0 0 8px; }
  .insight-body b { color: var(--ink); font-weight: 600; }
  .insight-action { font-size: 12px; color: var(--accent); font-weight: 600; padding-top: 8px; border-top: 1px dashed var(--line); }

  /* GOAL CARDS */
  .goals-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  @media (max-width: 1100px) { .goals-row { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px) { .goals-row { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .goals-row { grid-template-columns: 1fr; } }
  .goal-card { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 12px; min-height: 235px; }
  .goal-stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .stripe-on { background: var(--green); } .stripe-risk { background: var(--amber); } .stripe-off { background: var(--red); } .stripe-pending { background: var(--gray); }
  .goal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 4px; }
  .goal-icon { font-size: 22px; }
  .goal-pill { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.06em; }
  .pill-on { background: var(--green-soft); color: var(--green); }
  .pill-risk { background: var(--amber-soft); color: var(--amber); }
  .pill-off { background: var(--red-soft); color: var(--red); }
  .pill-pending { background: var(--gray-soft); color: var(--gray); }
  .goal-name { font-family: var(--serif); font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--ink-2); min-height: 36px; }
  .goal-big { display: flex; align-items: baseline; gap: 6px; margin-top: auto; }
  .goal-big-num { font-family: var(--serif); font-size: 54px; font-weight: 600; line-height: 0.9; letter-spacing: -0.04em; }
  .goal-big-target { font-size: 15px; color: var(--muted); font-weight: 500; }
  .goal-progress { display: flex; align-items: center; gap: 10px; }
  .goal-progress-bar { flex: 1; height: 6px; background: var(--surface); border-radius: 99px; overflow: hidden; }
  .goal-progress-fill { height: 100%; border-radius: 99px; }
  .goal-progress-pct { font-size: 11px; font-family: var(--mono); color: var(--muted); font-weight: 600; }
  .goal-projection { font-size: 10.5px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  /* DAILY PULSE */
  .pulse-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 900px) { .pulse-grid { grid-template-columns: 1fr; } }
  .pulse-card { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; }
  .pulse-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .pulse-name { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .pulse-sum { font-family: var(--serif); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
  .pulse-chart { height: 80px; position: relative; }

  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (max-width: 900px) { .metrics-grid { grid-template-columns: 1fr; } }
  .metric-card { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 18px 22px; }
  .metric-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 12px; }
  .metric-name { font-family: var(--serif); font-size: 15px; font-weight: 600; margin: 0; }
  .metric-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
  .metric-now { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .metric-val { font-family: var(--serif); font-size: 34px; font-weight: 600; line-height: 1; letter-spacing: -0.03em; }
  .metric-unit { font-size: 13px; color: var(--muted); font-weight: 500; }
  .metric-delta { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .delta-up { background: var(--green-soft); color: var(--green); }
  .delta-down { background: var(--red-soft); color: var(--red); }
  .delta-flat { background: var(--gray-soft); color: var(--gray); }
  .metric-context { font-size: 11.5px; color: var(--muted); margin-bottom: 10px; }
  .metric-chart-wrap { position: relative; height: 80px; }
  .metric-foot { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 6px; font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase; }
  .metric-empty { display:flex; align-items:center; justify-content:center; height:100%; color:var(--muted); font-size:12px; }

  /* LOADING STATE */
  .loading-row { display: flex; align-items: center; gap: 10px; padding: 20px; color: var(--muted); font-size: 13px; font-family: var(--mono); }
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--line) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; height: 14px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* COMPOSITION */
  .comp-wrap { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 22px 24px; display: grid; grid-template-columns: 240px 1fr; gap: 28px; align-items: center; }
  @media (max-width: 720px) { .comp-wrap { grid-template-columns: 1fr; } }
  .comp-chart-wrap { position: relative; height: 220px; }
  .comp-list { display: flex; flex-direction: column; gap: 8px; }
  .comp-row { display: grid; grid-template-columns: 16px 1fr auto auto; gap: 10px; align-items: center; font-size: 13px; }
  .comp-dot { width: 12px; height: 12px; border-radius: 3px; }
  .comp-label { font-weight: 500; color: var(--ink-2); }
  .comp-count { font-family: var(--mono); color: var(--muted); }
  .comp-roi { font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .roi-good { background: var(--green-soft); color: var(--green); }
  .roi-bad { background: var(--red-soft); color: var(--red); }
  .roi-neutral { background: var(--gray-soft); color: var(--gray); }

  /* RECENT */
  .entries-wrap { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .entries-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .entries-table th { text-align: left; padding: 12px 18px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; background: var(--surface); font-family: var(--mono); }
  .entries-table td { padding: 12px 18px; border-top: 1px solid var(--line); }
  .entries-table tr:hover td { background: var(--surface); }
  .entries-table .num { font-family: var(--mono); font-weight: 600; text-align: right; }
  .entries-table .channel { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--mono); }

  /* CONNECTORS */
  .connectors { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  @media (max-width: 900px) { .connectors { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 480px) { .connectors { grid-template-columns: repeat(2, 1fr); } }
  .conn { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.15s, background 0.15s; }
  .conn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .conn-icon { font-size: 20px; }
  .conn-name { font-weight: 700; font-size: 13px; }
  .conn-note { font-size: 11px; color: var(--muted); }

  .footer { margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); gap: 12px; flex-wrap: wrap; font-family: var(--mono); }
  .footer a { color: var(--accent); text-decoration: none; }

  /* LIVE BADGE */
  .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-family: var(--mono); font-weight: 700; color: var(--green); background: var(--green-soft); padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
</style>
</head>

<script>
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
// DATA FETCH — reads data.json built by GitHub Actions
// ════════════════════════════════════════════════════════
async function fetchKpiEntries() {
  const resp = await fetch(DATA_URL + '?t=' + Date.now());
  if (!resp.ok) throw new Error(`data.json fetch ${resp.status}`);
  const data = await resp.json();
  return data.entries || [];
}

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
const sum = a => a.reduce((x, y) => x + y, 0);
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const escapeHtml = s => (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function fmt(n, unit) {
  if (n == null || isNaN(n)) return '—';
  if (unit === '%') return n.toFixed(1);
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(1);
}
function nextMonday9am(now) {
  const d = new Date(now);
  const day = d.getDay();
  let ahead = (8 - day) % 7;
  if (ahead === 0) ahead = d.getHours() < 9 ? 0 : 7;
  d.setDate(d.getDate() + ahead);
  d.setHours(9, 0, 0, 0);
  return d;
}
function fmtSyncDate(d) {
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

// ════════════════════════════════════════════════════════
// BUILD METRICS from live Notion data
// ════════════════════════════════════════════════════════
function buildMetrics(entries) {
  // Get most recent value per metric
  const latest = {};
  for (const e of entries) {
    if (!e.metric) continue;
    if (!latest[e.metric]) latest[e.metric] = e;
  }

  return Object.entries(METRIC_BASELINES).map(([name, base]) => {
    const live = latest[name];
    return {
      name,
      unit: base.unit || live?.unit || '',
      apr: base.apr,
      now: live ? live.value : null,
      target: base.target,
      channel: base.channel,
      liveNote: live ? `Updated ${live.period}` : 'No data yet',
    };
  });
}

function buildRecentEntries(entries) {
  return entries.slice(0, 15).map(e => ({
    period: e.period,
    metric: e.metric,
    channel: e.channel,
    value: e.value != null ? String(e.value) + (e.unit === '%' ? '%' : '') : '—',
    note: e.notes || e.source || '',
  }));
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════

        </div>
      </div>
      <div class="hero-right">
        <div class="donut-wrap">
          <canvas id="cycle-donut"></canvas>
          <div class="donut-center">
            <div class="donut-pct">${Math.round(elapsedPct * 100)}%</div>
            <div class="donut-label">elapsed</div>
          </div>
        </div>
        <div class="donut-meta"><b>${totalDays - elapsedDays} days</b> remaining · <b>${CYCLE.totalPieces}</b> pieces</div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2 class="section-title">Insights</h2>
        <div class="section-sub">What the data is telling me, right now</div>
      </div>

        ${INSIGHTS.map(i => `

    <div class="section">
      <div class="section-head">
        <h2 class="section-title">The 5 Goals</h2>
        <div class="section-sub">
          <b>${counts['On Track']}</b> on track ·
          <b>${counts['At Risk']}</b> at risk ·
          <b>${counts['Off Track']}</b> off track ·
          <b>${counts['Pending']}</b> pending

      </div>
      <div class="goals-row">
        ${GOALS.map(g => renderGoal(g, elapsedPct)).join('')}

    </div>

    <div class="section">
      <div class="section-head">

      </div>
      <div class="pulse-grid">
        ${renderPulse('LinkedIn impressions', DAILY.linkedin, '#7c3aed', 'pulse-li')}

      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2 class="section-title">All Metrics</h2>
        <div class="section-sub">
          Live from Notion KPI Tracker · April baseline vs now vs target
          <span class="live-badge" style="margin-left:8px;"><span class="live-dot"></span>Live</span>
        </div>
      </div>
      <div class="metrics-grid">
        ${metrics.map((m, i) => renderMetric(m, i)).join('')}

    <div class="section">

        <a href="https://www.notion.so/988401501f9746f0bed594eb3c180a32" target="_blank">Cycle Goals</a> ·
        <a href="https://www.notion.so/71052c30eae94e6c85d168b3b70121ee" target="_blank">KPI Tracker</a>

}

function renderGoal(g, elapsedPct) {
  const style = STYLE[g.status];
  const pct = (g.target && g.actual != null) ? Math.min(100, (g.actual / g.target) * 100) : 0;
  const display = g.actual == null ? '—' : (g.unit === '%' ? g.actual + '%' : g.actual);
  let projection = '';
  if (g.actual != null && g.target != null && elapsedPct > 0.05 && g.actual > 0) {
    const projected = g.actual / elapsedPct;
    projection = `Pace: ${projected.toFixed(0)} (${Math.round((projected / g.target) * 100)}% of target)`;
  } else if (g.actual === 0 && elapsedPct > 0.05) {
    projection = `${Math.round((1 - elapsedPct) * 100)}% time left`;
  } else {
    projection = g.note || '';
  }
  return `<div class="goal-card">
    <div class="goal-stripe ${style.stripe}"></div>
    <div class="goal-head"><span class="goal-icon">${g.icon}</span><span class="goal-pill ${style.pill}">${g.status}</span></div>
    <div class="goal-name">${escapeHtml(g.short)}</div>
    <div class="goal-big">
      <span class="goal-big-num">${display}</span>
      <span class="goal-big-target">of ${g.target}${g.unit === '%' ? '%' : ' ' + g.unit}</span>
    </div>
    <div class="goal-progress">
      <div class="goal-progress-bar"><div class="goal-progress-fill" style="width: ${pct}%; background: ${style.color};"></div></div>
      <div class="goal-progress-pct">${Math.round(pct)}%</div>
    </div>
    <div class="goal-projection">${escapeHtml(projection)}</div>
  </div>`;
}

function renderMetric(m, idx) {
  let delta = '';
  if (m.apr != null && m.now != null) {
    const diff = m.now - m.apr;
    if (Math.abs(diff) > 0.05) {
      const cls = diff > 0 ? 'delta-up' : 'delta-down';
      delta = `<span class="metric-delta ${cls}">${diff > 0 ? '↑' : '↓'} ${fmt(Math.abs(diff), m.unit)}${m.unit === '%' ? 'pp' : ''}</span>`;
    } else {
      delta = `<span class="metric-delta delta-flat">= vs Apr</span>`;
    }
  } else if (m.now == null) {
    delta = `<span class="metric-delta delta-flat">no data</span>`;
  }
  const sub = m.liveNote || (m.apr != null ? `Apr baseline: ${fmt(m.apr, m.unit)}${m.unit === '%' ? '%' : ''}` : 'No baseline');
  return `<div class="metric-card">
    <div class="metric-head">
      <div><h3 class="metric-name">${escapeHtml(m.name)}</h3><div class="metric-sub">${escapeHtml(sub)}</div></div>
      ${delta}
    </div>
    <div class="metric-now">
      <span class="metric-val">${fmt(m.now, m.unit)}${m.unit === '%' ? '%' : ''}</span>
      <span class="metric-unit">${m.unit && m.unit !== '%' ? m.unit : (m.now != null ? 'this cycle' : '')}</span>
    </div>
    <div class="metric-context">Target: <b style="color: var(--ink-2);">${fmt(m.target, m.unit)}${m.unit === '%' ? '%' : (m.target && m.unit ? ' ' + m.unit : '')}</b></div>
    <div class="metric-chart-wrap"><canvas id="mc-${idx}" data-baseline="${m.apr ?? ''}" data-current="${m.now ?? ''}" data-target="${m.target ?? ''}" data-unit="${m.unit}"></canvas></div>
    <div class="metric-foot"><span>Apr</span><span>Now</span><span>Target</span></div>
  </div>`;
}

function renderPulse(name, daily, color, id) {
  const total = sum(daily.map(d => d.value));
  return `<div class="pulse-card">
    <div class="pulse-head"><div class="pulse-name">${escapeHtml(name)}</div><div class="pulse-sum">${total}</div></div>
    <div class="pulse-chart"><canvas id="${id}" data-color="${color}"></canvas></div>
  </div>`;
}

// ════════════════════════════════════════════════════════
// CHARTS
// ════════════════════════════════════════════════════════
function drawCharts(elapsedPct) {
  const donut = document.getElementById('cycle-donut');
  if (donut) new Chart(donut, {
    type: 'doughnut',
    data: { datasets: [{ data: [elapsedPct * 100, (1 - elapsedPct) * 100], backgroundColor: ['#1d3557', '#f5f5f1'], borderWidth: 0 }] },
    options: { cutout: '74%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
  });

  document.querySelectorAll('canvas[id^="mc-"]').forEach(canvas => {
    const b = parseFloat(canvas.dataset.baseline);
    const c = parseFloat(canvas.dataset.current);
    const t = parseFloat(canvas.dataset.target);
    const unit = canvas.dataset.unit;
    const data = [isNaN(b)?0:b, isNaN(c)?0:c, isNaN(t)?0:t];
    if (!data.some(v => v > 0)) {
      canvas.parentElement.innerHTML = '<div class="metric-empty">No data yet</div>';
      return;
    }
    new Chart(canvas, {
      type: 'bar',
      data: { labels: ['Apr', 'Now', 'Target'], datasets: [{ data, backgroundColor: ['#94a3b8', '#1d3557', '#cbd5e1'], borderRadius: 5, barThickness: 18 }] },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.x + (unit === '%' ? '%' : '') } } },
        scales: { x: { display: false, grid: { display: false } }, y: { grid: { display: false }, ticks: { font: { size: 10, weight: 600 } } } }
      }
    });
  });

  [{ id: 'pulse-li', data: DAILY.linkedin, color: '#7c3aed' },{ id: 'pulse-ga4', data: DAILY.ga4, color: '#1d3557' },{ id: 'pulse-ig', data: DAILY.instagram, color: '#db2777' }].forEach(p => {
    const c = document.getElementById(p.id);
    if (!c) return;
    new Chart(c, {
      type: 'line',
      data: { labels: p.data.map(d => d.date), datasets: [{ data: p.data.map(d => d.value), borderColor: p.color, backgroundColor: p.color + '22', fill: true, tension: 0.35, pointRadius: 3, pointBackgroundColor: p.color, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { ticks: { font: { size: 9 } }, grid: { display: false } }, y: { beginAtZero: true, ticks: { font: { size: 9 } }, grid: { color: '#f0f0eb' } } } }
    });
  });

  const comp = document.getElementById('comp-chart');
  if (comp) {
    const entries = Object.entries(CYCLE.pillars).filter(([n, c]) => c > 0);
    new Chart(comp, {
      type: 'doughnut',
      data: { labels: entries.map(e => e[0]), datasets: [{ data: entries.map(e => e[1]), backgroundColor: entries.map(e => PILLAR_COLORS[e[0]] || '#64748b'), borderWidth: 2, borderColor: '#ffffff' }] },
      options: { cutout: '60%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + ctx.parsed + ' pieces' } } } }
    });
  }
}

// ════════════════════════════════════════════════════════
// MAIN
// ════════════════════════════════════════════════════════
async function main() {
  const now = new Date();
  const lastSyncLabel = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }) + ' today';
  const nextSyncLabel = fmtSyncDate(nextMonday9am(now)) + ' · 9:30 AM UTC';

  let metrics, recentEntries;

  try {
    const entries = await fetchKpiEntries();
    metrics = buildMetrics(entries);
    recentEntries = buildRecentEntries(entries);
  } catch (err) {
    console.error('Notion fetch failed:', err);
    // Fallback to static data if Notion unreachable
    metrics = Object.entries(METRIC_BASELINES).map(([name, base]) => ({ name, ...base, now: null, liveNote: 'Could not load live data' }));
    recentEntries = [];
  }

  const today = now.toISOString().slice(0, 10);
  const totalDays = daysBetween(CYCLE.start, CYCLE.end) + 1;
  const elapsedDays = Math.max(0, Math.min(totalDays, daysBetween(CYCLE.start, today) + 1));
  const elapsedPct = Math.max(0, Math.min(1, elapsedDays / totalDays));

  document.getElementById('app').innerHTML = render(metrics, recentEntries, lastSyncLabel, nextSyncLabel);

  function tryDraw(attempts) {
    if (typeof Chart !== 'undefined') { drawCharts(elapsedPct); return; }
    if (attempts > 50) return;
    setTimeout(() => tryDraw(attempts + 1), 50);
  }
  tryDraw(0);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', main);
} else {
  main();
}
</script>
