name: Google KPI Sync

on:
  schedule:
    - cron: "30 9 * * 1"  # Every Monday 9:30 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-google.txt

      - name: Run Google KPI sync
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/google_kpi_sync.py

      - name: Export Notion data to data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/export_notion_data.py

      - name: Commit and push data.json
        run: |
          git config user.email "melissa@na-mii.co"
          git config user.name "Melissa Patenaude"
          git add data.json
          git diff --staged --quiet || git commit -m "Weekly data sync — $(date -u +%Y-%m-%d)"
          git push origin HEAD
